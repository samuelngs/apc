<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK KR</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>

  <!-- Common web fonts not installed — map to Noto -->
  <alias binding="same">
    <family>Arial</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Helvetica</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Helvetica Neue</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Segoe UI</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>-apple-system</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>BlinkMacSystemFont</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>system-ui</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Roboto</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Verdana</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Tahoma</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Trebuchet MS</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>Times New Roman</family>
    <accept><family>Noto Serif</family></accept>
  </alias>
  <alias binding="same">
    <family>Georgia</family>
    <accept><family>Noto Serif</family></accept>
  </alias>
  <alias binding="same">
    <family>Courier New</family>
    <accept><family>Noto Sans Mono</family></accept>
  </alias>
  <alias binding="same">
    <family>Consolas</family>
    <accept><family>Noto Sans Mono</family></accept>
  </alias>
  <alias binding="same">
    <family>Menlo</family>
    <accept><family>Noto Sans Mono</family></accept>
  </alias>
  <alias binding="same">
    <family>Monaco</family>
    <accept><family>Noto Sans Mono</family></accept>
  </alias>
  <alias binding="same">
    <family>SF Pro</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>SF Pro Display</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>SF Pro Text</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias binding="same">
    <family>SF Mono</family>
    <accept><family>Noto Sans Mono</family></accept>
  </alias>
</fontconfig>
